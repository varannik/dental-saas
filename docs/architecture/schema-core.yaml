      - { name: idx_referrals_patient_status, columns: [patient_id, status, created_at] }
      - { name: idx_referrals_target_tenant, columns: [to_tenant_id, status, created_at] }

  # ---------------------------------------------------------------------------
  # Platform Extensibility
  # ---------------------------------------------------------------------------

  - name: DrugReference
    table: drug_reference
    description: Tenant-scoped or global medication reference coding.
    primary_key: id
    columns:
      - { name: id,            type: uuid,        nullable: false, default: uuid_generate_v4() }
      - { name: tenant_id,     type: uuid,        nullable: true, references: tenants.id }
      - { name: rxnorm_code,   type: text,        nullable: false }
      - { name: name,          type: text,        nullable: false }
      - { name: generic_name,  type: text,        nullable: true }
      - { name: strength,      type: text,        nullable: true }
      - { name: form,          type: text,        nullable: true }
      - { name: route,         type: text,        nullable: true }
      - { name: is_controlled, type: boolean,     nullable: false, default: false }
      - { name: is_active,     type: boolean,     nullable: false, default: true }
      - { name: metadata,      type: jsonb,       nullable: true }
      - { name: created_at,    type: timestamptz, nullable: false, default: now() }
      - { name: updated_at,    type: timestamptz, nullable: false, default: now() }
    indexes:
      - { name: uq_drug_reference_scope_code, columns: [tenant_id, rxnorm_code], unique: true }
      - { name: idx_drug_reference_name, columns: [name, is_active] }

  - name: CustomFieldDefinition
    table: custom_field_definitions
    description: Tenant and entity scoped custom-field contracts.
    primary_key: id
    columns:
      - { name: id,                 type: uuid,        nullable: false, default: uuid_generate_v4() }
      - { name: tenant_id,          type: uuid,        nullable: false, references: tenants.id }
      - { name: entity_type,        type: text,        nullable: false }
      - { name: field_key,          type: text,        nullable: false }
      - { name: label,              type: text,        nullable: false }
      - { name: value_type,         type: text,        nullable: false }
      - { name: is_required,        type: boolean,     nullable: false, default: false }
      - { name: is_indexed,         type: boolean,     nullable: false, default: false }
      - { name: validation_rules,   type: jsonb,       nullable: true }
      - { name: default_value,      type: jsonb,       nullable: true }
      - { name: status,             type: text,        nullable: false, default: 'ACTIVE' }
      - { name: created_by_user_id, type: uuid,        nullable: true, references: users.id }
      - { name: created_at,         type: timestamptz, nullable: false, default: now() }
      - { name: updated_at,         type: timestamptz, nullable: false, default: now() }
    indexes:
      - { name: uq_custom_field_definitions_scope, columns: [tenant_id, entity_type, field_key], unique: true }
      - { name: idx_custom_field_definitions_tenant_status, columns: [tenant_id, status, updated_at] }

  - name: CustomFieldValue
    table: custom_field_values
    description: Runtime custom field values bound to polymorphic entities.
    primary_key: id
    columns:
      - { name: id,                 type: uuid,          nullable: false, default: uuid_generate_v4() }
      - { name: tenant_id,          type: uuid,          nullable: false, references: tenants.id }
      - { name: definition_id,      type: uuid,          nullable: false, references: custom_field_definitions.id }
      - { name: entity_type,        type: text,          nullable: false }
      - { name: entity_id,          type: uuid,          nullable: false }
      - { name: value_json,         type: jsonb,         nullable: true }
      - { name: value_text,         type: text,          nullable: true }
      - { name: value_number,       type: numeric(14,4), nullable: true }
      - { name: value_boolean,      type: boolean,       nullable: true }
      - { name: value_date,         type: date,          nullable: true }
      - { name: recorded_at,        type: timestamptz,   nullable: false, default: now() }
      - { name: created_by_user_id, type: uuid,          nullable: true, references: users.id }
      - { name: created_at,         type: timestamptz,   nullable: false, default: now() }
      - { name: updated_at,         type: timestamptz,   nullable: false, default: now() }
    indexes:
      - { name: uq_custom_field_values_entity, columns: [definition_id, entity_type, entity_id], unique: true }
      - { name: idx_custom_field_values_tenant_entity, columns: [tenant_id, entity_type, entity_id] }
      - { name: idx_custom_field_values_definition, columns: [definition_id, recorded_at] }

  - name: Workflow
    table: workflows
    description: Reusable configurable workflow definitions.
    primary_key: id
    columns:
      - { name: id,                 type: uuid,        nullable: false, default: uuid_generate_v4() }
      - { name: tenant_id,          type: uuid,        nullable: false, references: tenants.id }
      - { name: key,                type: text,        nullable: false }
      - { name: name,               type: text,        nullable: false }
      - { name: description,        type: text,        nullable: true }
      - { name: workflow_type,      type: text,        nullable: false, default: 'OPERATIONAL' }
      - { name: version,            type: integer,     nullable: false, default: 1 }
      - { name: definition,         type: jsonb,       nullable: false }
      - { name: trigger_type,       type: text,        nullable: true }
      - { name: is_active,          type: boolean,     nullable: false, default: true }
      - { name: created_by_user_id, type: uuid,        nullable: true, references: users.id }
      - { name: created_at,         type: timestamptz, nullable: false, default: now() }
      - { name: updated_at,         type: timestamptz, nullable: false, default: now() }
    indexes:
      - { name: uq_workflows_tenant_key_version, columns: [tenant_id, key, version], unique: true }
      - { name: idx_workflows_tenant_active, columns: [tenant_id, is_active, updated_at] }

  - name: WorkflowInstance
    table: workflow_instances
    description: Runtime workflow execution state records.
    primary_key: id
    columns:
      - { name: id,                 type: uuid,        nullable: false, default: uuid_generate_v4() }
      - { name: tenant_id,          type: uuid,        nullable: false, references: tenants.id }
      - { name: workflow_id,        type: uuid,        nullable: false, references: workflows.id }
      - { name: entity_type,        type: text,        nullable: true }
      - { name: entity_id,          type: uuid,        nullable: true }
      - { name: status,             type: text,        nullable: false, default: 'PENDING' }
      - { name: input_payload,      type: jsonb,       nullable: true }
      - { name: context,            type: jsonb,       nullable: true }
      - { name: current_step,       type: text,        nullable: true }
      - { name: started_by_user_id, type: uuid,        nullable: true, references: users.id }
      - { name: started_at,         type: timestamptz, nullable: true }
      - { name: completed_at,       type: timestamptz, nullable: true }
      - { name: failed_at,          type: timestamptz, nullable: true }
      - { name: error_message,      type: text,        nullable: true }
      - { name: created_at,         type: timestamptz, nullable: false, default: now() }
      - { name: updated_at,         type: timestamptz, nullable: false, default: now() }
    indexes:
      - { name: idx_workflow_instances_tenant_status, columns: [tenant_id, status, created_at] }
      - { name: idx_workflow_instances_workflow, columns: [workflow_id, created_at] }
      - { name: idx_workflow_instances_entity, columns: [entity_type, entity_id, created_at] }

  # ---------------------------------------------------------------------------
  # Reference Data & Coding
  # ---------------------------------------------------------------------------

  - name: CodeSystem
    table: code_systems
    description: Code system registry (CDT, ICD10, SNOMED, internal).
    primary_key: id
    columns:
      - { name: id,         type: uuid,        nullable: false, default: uuid_generate_v4() }
      - { name: tenant_id,  type: uuid,        nullable: true, references: tenants.id }
      - { name: system_key, type: text,        nullable: false }
      - { name: name,       type: text,        nullable: false }
      - { name: version,    type: text,        nullable: true }
      - { name: is_active,  type: boolean,     nullable: false, default: true }
      - { name: metadata,   type: jsonb,       nullable: true }
      - { name: created_at, type: timestamptz, nullable: false, default: now() }
      - { name: updated_at, type: timestamptz, nullable: false, default: now() }
    indexes:
      - { name: idx_code_systems_active, columns: [tenant_id, system_key, is_active] }

  - name: CodeValue
    table: code_values
    description: Code dictionary entries used for diagnosis, findings, and procedures.
    primary_key: id
    columns:
      - { name: id,            type: uuid,        nullable: false, default: uuid_generate_v4() }
      - { name: tenant_id,     type: uuid,        nullable: true, references: tenants.id }
      - { name: system_id,     type: uuid,        nullable: false, references: code_systems.id }
      - { name: code,          type: text,        nullable: false }
      - { name: display,       type: text,        nullable: false }
      - { name: description,   type: text,        nullable: true }
      - { name: category,      type: text,        nullable: true }
      - { name: is_billable,   type: boolean,     nullable: false, default: false }
      - { name: is_active,     type: boolean,     nullable: false, default: true }
      - { name: effective_from,type: date,        nullable: true }
      - { name: effective_to,  type: date,        nullable: true }
      - { name: metadata,      type: jsonb,       nullable: true }
      - { name: created_at,    type: timestamptz, nullable: false, default: now() }
      - { name: updated_at,    type: timestamptz, nullable: false, default: now() }
    indexes:
      - { name: idx_code_values_lookup, columns: [tenant_id, system_id, code, is_active] }
      - { name: idx_code_values_category, columns: [tenant_id, category, is_active] }
      - { name: idx_code_values_display_search, columns: [system_id, display] }

  - name: ProcedureCatalog
    table: procedure_catalog
    description: Procedure metadata linked to code values for planning and billing.
    primary_key: id
    columns:
      - { name: id,                   type: uuid,        nullable: false, default: uuid_generate_v4() }
      - { name: tenant_id,            type: uuid,        nullable: true, references: tenants.id }
      - { name: code_value_id,        type: uuid,        nullable: false, references: code_values.id }
      - { name: procedure_type,       type: text,        nullable: true }
      - { name: default_duration_min, type: integer,     nullable: true }
      - { name: requires_tooth,       type: boolean,     nullable: false, default: false }
      - { name: requires_surface,     type: boolean,     nullable: false, default: false }
      - { name: is_active,            type: boolean,     nullable: false, default: true }
      - { name: metadata,             type: jsonb,       nullable: true }
      - { name: created_at,           type: timestamptz, nullable: false, default: now() }
      - { name: updated_at,           type: timestamptz, nullable: false, default: now() }
    indexes:
      - { name: idx_procedure_catalog_active, columns: [tenant_id, is_active] }
      - { name: idx_procedure_catalog_code, columns: [code_value_id] }

  - name: FeeSchedule
    table: fee_schedules
    description: Fee schedule header for tenant/location/payer scopes.
    primary_key: id
    columns:
      - { name: id,             type: uuid,        nullable: false, default: uuid_generate_v4() }
      - { name: tenant_id,      type: uuid,        nullable: false, references: tenants.id }
      - { name: name,           type: text,        nullable: false }
      - { name: scope_type,     type: text,        nullable: false, default: 'TENANT' }
      - { name: scope_id,       type: uuid,        nullable: true }
      - { name: currency,       type: text,        nullable: false, default: 'USD' }
      - { name: effective_from, type: date,        nullable: false }
      - { name: effective_to,   type: date,        nullable: true }
      - { name: is_active,      type: boolean,     nullable: false, default: true }
      - { name: created_at,     type: timestamptz, nullable: false, default: now() }
      - { name: updated_at,     type: timestamptz, nullable: false, default: now() }
    indexes:
      - { name: idx_fee_schedules_active, columns: [tenant_id, is_active, effective_from] }

  - name: FeeScheduleItem
    table: fee_schedule_items
    description: Fee rows mapping procedures to monetary amounts per schedule.
    primary_key: id
    columns:
      - { name: id,                   type: uuid,          nullable: false, default: uuid_generate_v4() }
      - { name: fee_schedule_id,      type: uuid,          nullable: false, references: fee_schedules.id }
      - { name: procedure_catalog_id, type: uuid,          nullable: false, references: procedure_catalog.id }
      - { name: amount,               type: numeric(12,2), nullable: false }
      - { name: min_amount,           type: numeric(12,2), nullable: true }
      - { name: max_amount,           type: numeric(12,2), nullable: true }
      - { name: unit,                 type: text,          nullable: false, default: 'EACH' }
      - { name: created_at,           type: timestamptz,   nullable: false, default: now() }
      - { name: updated_at,           type: timestamptz,   nullable: false, default: now() }
    indexes:
      - { name: idx_fee_schedule_items_schedule, columns: [fee_schedule_id] }
      - { name: idx_fee_schedule_items_procedure, columns: [procedure_catalog_id] }

  # ---------------------------------------------------------------------------
  # Voice & Conversational AI
  # ---------------------------------------------------------------------------

  - name: VoiceSession
    table: voice_sessions
    description: High-level container for a voice interaction session (agent + user).
    primary_key: id
    columns:
      - { name: id,             type: uuid,        nullable: false, default: uuid_generate_v4() }
      - { name: tenant_id,      type: uuid,        nullable: false, references: tenants.id }
      - { name: user_id,        type: uuid,        nullable: true,  references: users.id, comment: "Clinician or staff user, if authenticated" }
      - { name: patient_id,     type: uuid,        nullable: true,  references: patients.id }
      - { name: encounter_id,   type: uuid,        nullable: true,  references: encounters.id }
      - { name: channel,        type: text,        nullable: false, comment: "MOBILE_APP | BROWSER | PHONE | DEVICE" }
      - { name: input_locale,   type: text,        nullable: true,  comment: "Locale expected from user speech (e.g., fa-IR)" }
      - { name: output_locale,  type: text,        nullable: true,  comment: "Locale for agent responses (text + TTS)" }
      - { name: asr_language,   type: text,        nullable: true,  comment: "ASR language code sent to provider" }
      - { name: tts_voice_id,   type: text,        nullable: true,  comment: "Provider voice identifier selected for locale" }
      - { name: started_at,     type: timestamptz, nullable: false, default: now() }
      - { name: ended_at,       type: timestamptz, nullable: true }
      - { name: meta,           type: jsonb,       nullable: true,  comment: "Device info, locale, etc." }
    indexes:
      - { name: idx_voice_sessions_tenant_time, columns: [tenant_id, started_at] }

  - name: VoiceUtterance
    table: voice_utterances
    description: Individual utterance in a voice session, with transcript and intent.
    primary_key: id
    columns:
      - { name: id,             type: uuid,        nullable: false, default: uuid_generate_v4() }
      - { name: session_id,     type: uuid,        nullable: false, references: voice_sessions.id }
      - { name: sequence_no,    type: integer,     nullable: false }
      - { name: speaker,        type: text,        nullable: false, comment: "USER | PATIENT | AGENT" }
      - { name: transcript,     type: text,        nullable: true }
      - { name: transcript_locale, type: text,     nullable: true,  comment: "Locale identified by ASR for this utterance" }
      - { name: normalized_transcript, type: text, nullable: true,  comment: "Locale-normalized transcript for NLU/RAG indexing" }
      - { name: is_final,       type: boolean,     nullable: false, default: true, comment: "Final vs partial ASR result" }
      - { name: intent,         type: text,        nullable: true }
      - { name: entities,       type: jsonb,       nullable: true, comment: "Extracted entities, slots, parameters" }
      - { name: created_at,     type: timestamptz, nullable: false, default: now() }
    indexes:
      - { name: idx_voice_utterances_session_seq, columns: [session_id, sequence_no], unique: true }

  - name: VoiceRecording
    table: voice_recordings
    description: Optional persisted audio blobs for voice utterances/sessions.
    primary_key: id
    columns:
      - { name: id,             type: uuid,        nullable: false, default: uuid_generate_v4() }
      - { name: session_id,     type: uuid,        nullable: false, references: voice_sessions.id }
      - { name: utterance_id,   type: uuid,        nullable: true,  references: voice_utterances.id, comment: "If recording is per-utterance" }
      - { name: tenant_id,      type: uuid,        nullable: false, references: tenants.id }
      - { name: audio_uri,      type: text,        nullable: false, comment: "Object storage key/path" }
      - { name: format,         type: text,        nullable: false, comment: "e.g., OPUS, WAV, MP3" }
      - { name: duration_ms,    type: integer,     nullable: true }
      - { name: sample_rate_hz, type: integer,     nullable: true }
      - { name: is_redacted,    type: boolean,     nullable: false, default: false }
      - { name: storage_class,  type: text,        nullable: false, default: 'HOT', comment: "HOT | ARCHIVE" }
      - { name: retention_until,type: timestamptz, nullable: true }
      - { name: created_at,     type: timestamptz, nullable: false, default: now() }
    indexes:
      - { name: idx_voice_recordings_tenant_session, columns: [tenant_id, session_id] }


