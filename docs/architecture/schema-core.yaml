      - { name: chart_json,    type: jsonb,       nullable: false }
      - { name: created_at,    type: timestamptz, nullable: false, default: now() }
    indexes:
      - { name: idx_tooth_chart_snapshots_tenant_patient_time, columns: [tenant_id, patient_id, created_at] }
      - { name: idx_tooth_chart_snapshots_encounter, columns: [encounter_id], where: "encounter_id IS NOT NULL" }

