      - { name: tenant_id,     type: uuid,        nullable: false, references: tenants.id }
      - { name: procedure_id,  type: uuid,        nullable: true, references: procedures.id }
      - { name: encounter_id,  type: uuid,        nullable: true, references: encounters.id }
      - { name: outcome_score, type: numeric(5,2),nullable: true }
      - { name: complications, type: text,        nullable: true }
      - { name: success_flag,  type: boolean,     nullable: true }
      - { name: notes,         type: text,        nullable: true }
      - { name: created_at,    type: timestamptz, nullable: false, default: now() }
    indexes:
      - { name: idx_clinical_outcomes_tenant_time, columns: [tenant_id, created_at] }

  # ---------------------------------------------------------------------------
  # Imaging & AI
  # ---------------------------------------------------------------------------

  - name: ImagingStudy
    table: imaging_studies
    description: Logical grouping for imaging acquisitions (DICOM Study).
    primary_key: id
    columns:
      - { name: id,              type: uuid,        nullable: false, default: uuid_generate_v4() }
      - { name: tenant_id,       type: uuid,        nullable: false, references: tenants.id }
      - { name: patient_id,      type: uuid,        nullable: false, references: patients.id }
      - { name: encounter_id,    type: uuid,        nullable: true,  references: encounters.id }
      - { name: study_uid,       type: text,        nullable: true,  comment: "DICOM StudyInstanceUID" }
      - { name: modality,        type: text,        nullable: false, comment: "INTRAORAL | PANORAMIC | CBCT | PHOTO | VIDEO" }
      - { name: body_part,       type: text,        nullable: true }
      - { name: acquisition_datetime, type: timestamptz, nullable: true }
      - { name: source_system,   type: text,        nullable: true }
      - { name: created_at,      type: timestamptz, nullable: false, default: now() }
      - { name: updated_at,      type: timestamptz, nullable: false, default: now() }
    indexes:
      - { name: idx_imaging_studies_tenant_patient, columns: [tenant_id, patient_id, acquisition_datetime] }

  - name: ImagingObject
    table: imaging_objects
    description: Individual image, series instance, or 3D volume file.
    primary_key: id
    columns:
      - { name: id,             type: uuid,        nullable: false, default: uuid_generate_v4() }
      - { name: study_id,       type: uuid,        nullable: false, references: imaging_studies.id }
      - { name: series_id,      type: uuid,        nullable: true }
      - { name: sop_instance_uid, type: text,      nullable: true }
      - { name: object_type,    type: text,        nullable: false, comment: "DICOM | JPEG | PNG | STL | MP4" }
      - { name: storage_uri,    type: text,        nullable: false, comment: "Object storage key/URL" }
      - { name: hash,           type: text,        nullable: true }
      - { name: byte_size,      type: bigint,      nullable: true }
      - { name: width,          type: integer,     nullable: true }
      - { name: height,         type: integer,     nullable: true }
      - { name: depth_slices,   type: integer,     nullable: true }
      - { name: is_original,    type: boolean,     nullable: false, default: true }
      - { name: processing_pipeline, type: jsonb,  nullable: true }
      - { name: created_at,     type: timestamptz, nullable: false, default: now() }
    indexes:
      - { name: idx_imaging_objects_study, columns: [study_id] }

  - name: ImagingSeries
    table: imaging_series
    description: Series-level grouping for study acquisitions.
    primary_key: id
    columns:
      - { name: id,            type: uuid,        nullable: false, default: uuid_generate_v4() }
      - { name: study_id,      type: uuid,        nullable: false, references: imaging_studies.id }
      - { name: series_uid,    type: text,        nullable: true }
      - { name: series_number, type: text,        nullable: true }
      - { name: modality,      type: text,        nullable: true }
      - { name: body_part,     type: text,        nullable: true }
      - { name: created_at,    type: timestamptz, nullable: false, default: now() }
    indexes:
      - { name: idx_imaging_series_study, columns: [study_id] }

  - name: ImageAnnotation
    table: image_annotations
    description: ROI and label annotations for imaging objects by AI or human users.
    primary_key: id
    columns:
      - { name: id,                type: uuid,        nullable: false, default: uuid_generate_v4() }
      - { name: tenant_id,         type: uuid,        nullable: false, references: tenants.id }
      - { name: imaging_object_id, type: uuid,        nullable: false, references: imaging_objects.id }
      - { name: annotation_type,   type: text,        nullable: false }
      - { name: annotation_data,   type: jsonb,       nullable: false }
      - { name: created_by_user_id,type: uuid,        nullable: true, references: users.id }
      - { name: created_at,        type: timestamptz, nullable: false, default: now() }
    indexes:
      - { name: idx_image_annotations_object, columns: [imaging_object_id] }

  - name: AIModel
    table: ai_models
    description: Logical AI model family (e.g., caries detection, perio).
    primary_key: id
    columns:
      - { name: id,            type: uuid,  nullable: false, default: uuid_generate_v4() }
      - { name: name,          type: text,  nullable: false }
      - { name: domain,        type: text,  nullable: false, comment: "CARIES | PERIO | PATHOLOGY | ORTHO | IMPLANT | CDS" }
      - { name: vendor,        type: text,  nullable: false, comment: "INTERNAL or external vendor tag" }
      - { name: regulatory_class, type: text, nullable: false, comment: "FDA_510K | CE_MDR | EXPERIMENTAL" }
      - { name: created_at,    type: timestamptz, nullable: false, default: now() }

  - name: AIModelVersion
    table: ai_model_versions
    description: Concrete version of an AI model, with performance metadata.
    primary_key: id
    columns:
      - { name: id,              type: uuid,        nullable: false, default: uuid_generate_v4() }
      - { name: model_id,        type: uuid,        nullable: false, references: ai_models.id }
      - { name: version_tag,     type: text,        nullable: false }
      - { name: artifact_uri,    type: text,        nullable: false }
      - { name: input_types,     type: jsonb,       nullable: false, comment: "Array of supported input entity types" }
      - { name: output_types,    type: jsonb,       nullable: false }
      - { name: performance_metrics, type: jsonb,   nullable: true }
      - { name: validated_on,    type: timestamptz, nullable: true }
      - { name: validation_summary_uri, type: text, nullable: true }
      - { name: sbom_uri,        type: text,        nullable: true }
      - { name: created_at,      type: timestamptz, nullable: false, default: now() }
    indexes:
      - { name: idx_ai_model_versions_model_version, columns: [model_id, version_tag], unique: true }

  - name: AIInferenceJob
    table: ai_inference_jobs
    description: A single AI inference run on a given input (study, patient snapshot, etc.).
    primary_key: id
    columns:
      - { name: id,             type: uuid,        nullable: false, default: uuid_generate_v4() }
      - { name: tenant_id,      type: uuid,        nullable: false, references: tenants.id }
      - { name: model_version_id, type: uuid,      nullable: false, references: ai_model_versions.id }
      - { name: input_type,     type: text,        nullable: false }
      - { name: input_ref_id,   type: uuid,        nullable: false }
      - { name: requested_by_user_id, type: uuid,  nullable: true, references: users.id }
      - { name: status,         type: text,        nullable: false, default: 'QUEUED' }
      - { name: started_at,     type: timestamptz, nullable: true }
      - { name: completed_at,   type: timestamptz, nullable: true }
      - { name: compute_env,    type: jsonb,       nullable: true }
      - { name: error_details,  type: text,        nullable: true }
      - { name: created_at,     type: timestamptz, nullable: false, default: now() }
    indexes:
      - { name: idx_ai_jobs_tenant_model_status, columns: [tenant_id, model_version_id, status, created_at] }

  - name: AIModelDeployment
    table: ai_model_deployments
    description: Deployment state and rollout strategy per model version.
    primary_key: id
    columns:
      - { name: id,               type: uuid,        nullable: false, default: uuid_generate_v4() }
      - { name: tenant_id,        type: uuid,        nullable: true, references: tenants.id }
      - { name: model_version_id, type: uuid,        nullable: false, references: ai_model_versions.id }
      - { name: status,           type: text,        nullable: false, default: 'ROLLED_OUT' }
      - { name: rollout_strategy, type: text,        nullable: true }
      - { name: created_by_id,    type: uuid,        nullable: true, references: users.id }
      - { name: created_at,       type: timestamptz, nullable: false, default: now() }
    indexes:
      - { name: idx_ai_model_deployments_tenant_status, columns: [tenant_id, status, created_at] }

  - name: AIPrediction
    table: ai_predictions
    description: Atomic AI prediction/finding produced by an inference job.
    primary_key: id
    columns:
      - { name: id,             type: uuid,        nullable: false, default: uuid_generate_v4() }
      - { name: job_id,         type: uuid,        nullable: false, references: ai_inference_jobs.id }
      - { name: tenant_id,      type: uuid,        nullable: false, references: tenants.id }
      - { name: patient_id,     type: uuid,        nullable: true,  references: patients.id }
      - { name: imaging_object_id, type: uuid,     nullable: true,  references: imaging_objects.id }
      - { name: prediction_type, type: text,       nullable: false }
      - { name: code,           type: text,        nullable: true, comment: "Maps to clinical code_values entry" }
      - { name: confidence,     type: numeric(5,4),nullable: true }
      - { name: severity,       type: text,        nullable: true }
      - { name: roi_annotation_id, type: uuid,     nullable: true, references: image_annotations.id }
      - { name: raw_output,     type: jsonb,       nullable: true }
      - { name: created_at,     type: timestamptz, nullable: false, default: now() }
    indexes:
      - { name: idx_ai_predictions_tenant_patient, columns: [tenant_id, patient_id, created_at] }

  - name: AIReviewEvent
    table: ai_review_events
    description: Human review actions on AI predictions.
    primary_key: id
    columns:
      - { name: id,               type: uuid,        nullable: false, default: uuid_generate_v4() }
      - { name: prediction_id,    type: uuid,        nullable: false, references: ai_predictions.id }
      - { name: reviewer_id,      type: uuid,        nullable: true, references: users.id }
      - { name: review_action,    type: text,        nullable: false, comment: "CONFIRMED | REJECTED | EDITED" }
      - { name: reason_code,      type: text,        nullable: true }
      - { name: comment,          type: text,        nullable: true }
      - { name: use_for_training, type: boolean,     nullable: false, default: true }
      - { name: created_at,       type: timestamptz, nullable: false, default: now() }
    indexes:
      - { name: idx_ai_review_events_prediction, columns: [prediction_id, created_at] }

  - name: AIOutcomeLink
    table: ai_outcome_links
    description: Link prediction outputs with ground-truth clinical outcomes.
    primary_key: id
    columns:
      - { name: id,                   type: uuid,        nullable: false, default: uuid_generate_v4() }
      - { name: prediction_id,        type: uuid,        nullable: false, references: ai_predictions.id }
      - { name: encounter_id,         type: uuid,        nullable: true, references: encounters.id }
      - { name: procedure_id,         type: uuid,        nullable: true, references: procedures.id }
      - { name: ground_truth_code,    type: text,        nullable: true }
      - { name: ground_truth_source,  type: text,        nullable: true }
      - { name: evaluation_timestamp, type: timestamptz, nullable: false }
      - { name: created_at,           type: timestamptz, nullable: false, default: now() }
    indexes:
      - { name: idx_ai_outcome_links_prediction, columns: [prediction_id, evaluation_timestamp] }

  # ---------------------------------------------------------------------------
  # Treatment & Claims
  # ---------------------------------------------------------------------------

  - name: TreatmentPlan
    table: treatment_plans
    description: High-level treatment plan for a patient.
    primary_key: id
    columns:
      - { name: id,             type: uuid,        nullable: false, default: uuid_generate_v4() }
      - { name: tenant_id,      type: uuid,        nullable: false, references: tenants.id }
      - { name: patient_id,     type: uuid,        nullable: false, references: patients.id }
      - { name: created_by_id,  type: uuid,        nullable: false, references: users.id }
      - { name: status,         type: text,        nullable: false, default: 'DRAFT' }
      - { name: total_estimated_cost, type: numeric(12,2), nullable: true }
      - { name: estimated_insurance_coverage, type: numeric(12,2), nullable: true }
      - { name: notes,          type: text,        nullable: true }
      - { name: created_at,     type: timestamptz, nullable: false, default: now() }
      - { name: updated_at,     type: timestamptz, nullable: false, default: now() }
    indexes:
      - { name: idx_treatment_plans_tenant_patient, columns: [tenant_id, patient_id, created_at] }

  - name: TreatmentPlanItem
    table: treatment_plan_items
    description: Planned procedure within a treatment plan.
    primary_key: id
    columns:
      - { name: id,             type: uuid,        nullable: false, default: uuid_generate_v4() }
      - { name: plan_id,        type: uuid,        nullable: false, references: treatment_plans.id }
      - { name: cdt_code,       type: text,        nullable: false }
      - { name: tooth_number,   type: text,        nullable: true }
      - { name: surface,        type: text,        nullable: true }
      - { name: phase,          type: integer,     nullable: true }
      - { name: sequence_order, type: integer,     nullable: true }
      - { name: estimated_fee,  type: numeric(12,2), nullable: true }
      - { name: estimated_patient_portion, type: numeric(12,2), nullable: true }

  - name: Claim
    table: claims
    description: Insurance claim header.
    primary_key: id
    columns:
      - { name: id,             type: uuid,        nullable: false, default: uuid_generate_v4() }
      - { name: tenant_id,      type: uuid,        nullable: false, references: tenants.id }
      - { name: patient_id,     type: uuid,        nullable: false, references: patients.id }
      - { name: payer_id,       type: uuid,        nullable: true }
      - { name: claim_number,   type: text,        nullable: true }
      - { name: status,         type: text,        nullable: false, default: 'DRAFT' }
      - { name: submitted_at,   type: timestamptz, nullable: true }
      - { name: total_billed_amount, type: numeric(12,2), nullable: true }
      - { name: total_allowed_amount, type: numeric(12,2), nullable: true }
      - { name: total_paid_amount, type: numeric(12,2), nullable: true }
      - { name: created_at,     type: timestamptz, nullable: false, default: now() }
      - { name: updated_at,     type: timestamptz, nullable: false, default: now() }
    indexes:
      - { name: idx_claims_tenant_patient, columns: [tenant_id, patient_id, created_at] }

  - name: ClaimLine
    table: claim_lines
    description: Individual service line within an insurance claim.
    primary_key: id
    columns:
      - { name: id,             type: uuid,        nullable: false, default: uuid_generate_v4() }
      - { name: claim_id,       type: uuid,        nullable: false, references: claims.id }
      - { name: procedure_id,   type: uuid,        nullable: true }
      - { name: cdt_code,       type: text,        nullable: false }
      - { name: billed_amount,  type: numeric(12,2), nullable: true }
      - { name: allowed_amount, type: numeric(12,2), nullable: true }
      - { name: paid_amount,    type: numeric(12,2), nullable: true }
      - { name: denial_reason,  type: text,        nullable: true }

  - name: BillingPlan
    table: billing_plans
    description: Platform billing plans defining subscription price and included quotas.
    primary_key: id
    columns:
      - { name: id,                 type: uuid,        nullable: false, default: uuid_generate_v4() }
      - { name: code,               type: text,        nullable: false }
      - { name: name,               type: text,        nullable: false }
      - { name: billing_cycle,      type: text,        nullable: false, default: 'MONTHLY' }
      - { name: currency,           type: text,        nullable: false, default: 'USD' }
      - { name: base_price,         type: numeric(12,2), nullable: false }
      - { name: included_seats,     type: numeric(12,2), nullable: true }
      - { name: included_ai_calls,  type: numeric(14,2), nullable: true }
      - { name: included_storage_gb,type: numeric(14,2), nullable: true }
      - { name: overage_policy,     type: jsonb,       nullable: true }
      - { name: metadata,           type: jsonb,       nullable: true }
      - { name: is_active,          type: boolean,     nullable: false, default: true }
      - { name: created_at,         type: timestamptz, nullable: false, default: now() }
      - { name: updated_at,         type: timestamptz, nullable: false, default: now() }
    indexes:
      - { name: billing_plans_code_unique, columns: [code], unique: true }
      - { name: idx_billing_plans_active, columns: [is_active] }

  - name: TenantBillingAccount
    table: tenant_billing_accounts
    description: Tenant billing profile and payment account binding.
    primary_key: id
    columns:
      - { name: id,                   type: uuid,        nullable: false, default: uuid_generate_v4() }
      - { name: tenant_id,            type: uuid,        nullable: false, references: tenants.id }
      - { name: billing_plan_id,      type: uuid,        nullable: false, references: billing_plans.id }
      - { name: status,               type: text,        nullable: false, default: 'ACTIVE' }
      - { name: billing_email,        type: text,        nullable: true }
      - { name: billing_address,      type: jsonb,       nullable: true }
      - { name: payment_provider,     type: text,        nullable: true }
      - { name: payment_customer_ref, type: text,        nullable: true }
      - { name: payment_method_ref,   type: text,        nullable: true }
      - { name: tax_id,               type: text,        nullable: true }
      - { name: next_billing_date,    type: date,        nullable: true }
      - { name: auto_pay,             type: boolean,     nullable: false, default: true }
      - { name: metadata,             type: jsonb,       nullable: true }
      - { name: created_at,           type: timestamptz, nullable: false, default: now() }
      - { name: updated_at,           type: timestamptz, nullable: false, default: now() }
    indexes:
      - { name: tenant_billing_accounts_tenant_unique, columns: [tenant_id], unique: true }
      - { name: idx_tenant_billing_accounts_status, columns: [status] }

  - name: UsageMeter
    table: usage_meters
    description: Meter definitions for billable usage dimensions.
    primary_key: id
    columns:
      - { name: id,               type: uuid,        nullable: false, default: uuid_generate_v4() }
      - { name: tenant_id,        type: uuid,        nullable: true, references: tenants.id }
      - { name: meter_key,        type: text,        nullable: false }
      - { name: unit,             type: text,        nullable: false }
      - { name: aggregation_type, type: text,        nullable: false, default: 'SUM' }
      - { name: reset_period,     type: text,        nullable: false, default: 'MONTHLY' }
      - { name: is_billable,      type: boolean,     nullable: false, default: true }
      - { name: is_active,        type: boolean,     nullable: false, default: true }
      - { name: metadata,         type: jsonb,       nullable: true }
      - { name: created_at,       type: timestamptz, nullable: false, default: now() }
      - { name: updated_at,       type: timestamptz, nullable: false, default: now() }
    indexes:
      - { name: uq_usage_meters_scope_key, columns: [tenant_id, meter_key], unique: true }
      - { name: idx_usage_meters_active, columns: [tenant_id, is_active] }

  - name: UsageMeterReading
    table: usage_meter_readings
    description: Period-bound usage facts for billing reconciliation.
    primary_key: id
    columns:
      - { name: id,            type: uuid,          nullable: false, default: uuid_generate_v4() }
      - { name: tenant_id,     type: uuid,          nullable: false, references: tenants.id }
      - { name: usage_meter_id,type: uuid,          nullable: false, references: usage_meters.id }
      - { name: period_start,  type: date,          nullable: false }
      - { name: period_end,    type: date,          nullable: false }
      - { name: reading_value, type: numeric(14,4), nullable: false }
      - { name: source,        type: text,          nullable: true }
      - { name: captured_at,   type: timestamptz,   nullable: false, default: now() }
      - { name: metadata,      type: jsonb,         nullable: true }
      - { name: created_at,    type: timestamptz,   nullable: false, default: now() }
    indexes:
      - { name: uq_usage_meter_readings_period, columns: [usage_meter_id, period_start, period_end], unique: true }
      - { name: idx_usage_meter_readings_tenant_meter, columns: [tenant_id, usage_meter_id, period_start] }

  - name: Invoice
    table: invoices
    description: Tenant invoice header for subscription and usage charges.
    primary_key: id
    columns:
      - { name: id,                        type: uuid,        nullable: false, default: uuid_generate_v4() }
      - { name: tenant_id,                 type: uuid,        nullable: false, references: tenants.id }
      - { name: tenant_billing_account_id, type: uuid,        nullable: false, references: tenant_billing_accounts.id }
      - { name: invoice_number,            type: text,        nullable: true }
      - { name: period_start,              type: date,        nullable: false }
      - { name: period_end,                type: date,        nullable: false }
      - { name: status,                    type: text,        nullable: false, default: 'DRAFT' }
      - { name: currency,                  type: text,        nullable: false, default: 'USD' }
      - { name: subtotal_amount,           type: numeric(12,2), nullable: false, default: 0 }
      - { name: tax_amount,                type: numeric(12,2), nullable: false, default: 0 }
      - { name: total_amount,              type: numeric(12,2), nullable: false, default: 0 }
      - { name: outstanding_amount,        type: numeric(12,2), nullable: false, default: 0 }
      - { name: issued_at,                 type: timestamptz, nullable: true }
      - { name: due_date,                  type: timestamptz, nullable: true }
      - { name: paid_at,                   type: timestamptz, nullable: true }
      - { name: notes,                     type: text,        nullable: true }
      - { name: metadata,                  type: jsonb,       nullable: true }
      - { name: created_at,                type: timestamptz, nullable: false, default: now() }
      - { name: updated_at,                type: timestamptz, nullable: false, default: now() }
    indexes:
      - { name: uq_invoices_tenant_number, columns: [tenant_id, invoice_number], unique: true }
      - { name: idx_invoices_tenant_status, columns: [tenant_id, status, created_at] }
      - { name: idx_invoices_billing_account, columns: [tenant_billing_account_id, created_at] }

  - name: InvoiceLineItem
    table: invoice_line_items
    description: Invoice itemized charges.
    primary_key: id
    columns:
      - { name: id,                    type: uuid,          nullable: false, default: uuid_generate_v4() }
      - { name: invoice_id,            type: uuid,          nullable: false, references: invoices.id }
      - { name: usage_meter_reading_id,type: uuid,          nullable: true, references: usage_meter_readings.id }
      - { name: line_type,             type: text,          nullable: false, default: 'SUBSCRIPTION' }
      - { name: description,           type: text,          nullable: false }
      - { name: quantity,              type: numeric(14,4), nullable: false, default: 1 }
      - { name: unit_price,            type: numeric(12,2), nullable: false, default: 0 }
      - { name: amount,                type: numeric(12,2), nullable: false, default: 0 }
      - { name: currency,              type: text,          nullable: false, default: 'USD' }
      - { name: metadata,              type: jsonb,         nullable: true }
      - { name: created_at,            type: timestamptz,   nullable: false, default: now() }
    indexes:
      - { name: idx_invoice_line_items_invoice, columns: [invoice_id] }
