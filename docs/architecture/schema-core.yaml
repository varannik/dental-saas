version: 1.0.0
database:
  engine: postgresql
  description: >
    Logical data schema for a multi-tenant, AI-enabled dental SaaS platform.
    This YAML is source-of-truth for table definitions and can be used to
    generate DDL, migrations, and API contracts.

conventions:
  id_type: uuid
  timestamp_columns:
    created_at: timestamptz
    updated_at: timestamptz
  multi_tenancy:
    tenant_column: tenant_id
    strategy: row_level

entities:
  # ---------------------------------------------------------------------------
  # Tenancy & Identity
  # ---------------------------------------------------------------------------

  - name: Tenant
    table: tenants
    description: Top-level organization (solo practice, group, DSO, academic, payer, regulator, AI vendor).
    primary_key: id
    columns:
      - { name: id,            type: uuid,        nullable: false, default: uuid_generate_v4() }
      - { name: name,          type: text,        nullable: false }
      - { name: type,          type: text,        nullable: false, comment: "SOLO_PRACTICE | GROUP_PRACTICE | DSO | ACADEMIC | PAYER | REGULATOR | AI_VENDOR | OTHER" }
      - { name: parent_tenant_id, type: uuid,     nullable: true,  references: tenants.id }
      - { name: primary_region,  type: text,      nullable: true }
      - { name: default_locale, type: text,       nullable: false, default: 'en-US', comment: "BCP-47 locale for UI and voice defaults (e.g., en-US, fa-IR)" }
      - { name: supported_locales, type: jsonb,   nullable: false, default: '["en-US"]', comment: "Allowed UI locales for this tenant" }
      - { name: supported_languages, type: jsonb, nullable: false, default: '["en"]', comment: "ISO language codes enabled for ASR/TTS/RAG routing" }
      - { name: partition_strategy, type: text,   nullable: false, default: 'ROW_LEVEL', comment: "ROW_LEVEL | SCHEMA | DATABASE" }
      - { name: status,        type: text,        nullable: false, default: 'ACTIVE' }
      - { name: created_at,    type: timestamptz, nullable: false, default: now() }
      - { name: updated_at,    type: timestamptz, nullable: false, default: now() }
    indexes:
      - { name: idx_tenants_parent, columns: [parent_tenant_id] }

  - name: Location
    table: locations
    description: Physical or virtual clinic sites belonging to a tenant.
    primary_key: id
    columns:
      - { name: id,         type: uuid,        nullable: false, default: uuid_generate_v4() }
      - { name: tenant_id,  type: uuid,        nullable: false, references: tenants.id }
      - { name: name,       type: text,        nullable: false }
      - { name: address,    type: jsonb,       nullable: true,  comment: "Structured address object" }
      - { name: timezone,   type: text,        nullable: true }
      - { name: status,     type: text,        nullable: false, default: 'ACTIVE' }
      - { name: created_at, type: timestamptz, nullable: false, default: now() }
      - { name: updated_at, type: timestamptz, nullable: false, default: now() }
    indexes:
      - { name: idx_locations_tenant, columns: [tenant_id] }

  - name: TenantSetting
    table: tenant_settings
    description: Per-tenant operational configuration and defaults.
    primary_key: tenant_id
    columns:
      - { name: tenant_id,              type: uuid,        nullable: false, references: tenants.id }
      - { name: data_residency_region,  type: text,        nullable: true }
      - { name: default_retention_policy, type: text,      nullable: true }
      - { name: localization_defaults,  type: jsonb,       nullable: true }
      - { name: clinical_workflow_options, type: jsonb,    nullable: true }
      - { name: created_at,             type: timestamptz, nullable: false, default: now() }
      - { name: updated_at,             type: timestamptz, nullable: false, default: now() }

  - name: TenantBranding
    table: tenant_branding
    description: White-label branding assets and communication identity.
    primary_key: tenant_id
    columns:
      - { name: tenant_id,      type: uuid,        nullable: false, references: tenants.id }
      - { name: logo_uri,       type: text,        nullable: true }
      - { name: icon_uri,       type: text,        nullable: true }
      - { name: primary_color,  type: text,        nullable: true }
      - { name: secondary_color,type: text,        nullable: true }
      - { name: email_from_name,type: text,        nullable: true }
      - { name: email_reply_to, type: text,        nullable: true }
      - { name: custom_css_uri, type: text,        nullable: true }
      - { name: created_at,     type: timestamptz, nullable: false, default: now() }
      - { name: updated_at,     type: timestamptz, nullable: false, default: now() }

  - name: SubscriptionPlan
    table: subscription_plans
    description: Catalog of commercial subscription plans.
    primary_key: id
    columns:
      - { name: id,            type: uuid,          nullable: false, default: uuid_generate_v4() }
      - { name: code,          type: text,          nullable: false, unique: true }
      - { name: name,          type: text,          nullable: false }
      - { name: tier,          type: text,          nullable: false }
      - { name: monthly_price, type: numeric(12,2), nullable: true }
      - { name: annual_price,  type: numeric(12,2), nullable: true }
      - { name: features,      type: jsonb,         nullable: true }
      - { name: is_active,     type: boolean,       nullable: false, default: true }
      - { name: created_at,    type: timestamptz,   nullable: false, default: now() }
      - { name: updated_at,    type: timestamptz,   nullable: false, default: now() }

  - name: TenantSubscription
    table: tenant_subscriptions
    description: Subscription instances per tenant.
    primary_key: id
    columns:
      - { name: id,           type: uuid,        nullable: false, default: uuid_generate_v4() }
      - { name: tenant_id,    type: uuid,        nullable: false, references: tenants.id }
      - { name: plan_id,      type: uuid,        nullable: false, references: subscription_plans.id }
      - { name: start_at,     type: timestamptz, nullable: false }
      - { name: end_at,       type: timestamptz, nullable: true }
      - { name: status,       type: text,        nullable: false, default: 'ACTIVE' }
      - { name: billing_cycle,type: text,        nullable: false, default: 'MONTHLY' }
      - { name: trial_ends_at,type: timestamptz, nullable: true }
      - { name: auto_renew,   type: boolean,     nullable: false, default: true }
      - { name: created_at,   type: timestamptz, nullable: false, default: now() }
      - { name: updated_at,   type: timestamptz, nullable: false, default: now() }
    indexes:
      - { name: idx_tenant_subscriptions_tenant_status, columns: [tenant_id, status, start_at] }
      - { name: idx_tenant_subscriptions_plan, columns: [plan_id] }

  - name: TenantFeature
    table: tenant_features
    description: Feature flag assignments for tenant capabilities.
    primary_key: id
    columns:
      - { name: id,         type: uuid,        nullable: false, default: uuid_generate_v4() }
      - { name: tenant_id,  type: uuid,        nullable: false, references: tenants.id }
      - { name: feature_key,type: text,        nullable: false }
      - { name: is_enabled, type: boolean,     nullable: false, default: true }
      - { name: source,     type: text,        nullable: false, default: 'PLAN' }
      - { name: expires_at, type: timestamptz, nullable: true }
      - { name: metadata,   type: jsonb,       nullable: true }
      - { name: created_at, type: timestamptz, nullable: false, default: now() }
      - { name: updated_at, type: timestamptz, nullable: false, default: now() }
    indexes:
      - { name: idx_tenant_features_tenant_enabled, columns: [tenant_id, is_enabled] }

  - name: TenantQuota
    table: tenant_quotas
    description: Configurable limits per tenant.
    primary_key: tenant_id
    columns:
      - { name: tenant_id,                    type: uuid,          nullable: false, references: tenants.id }
      - { name: max_users,                    type: integer,       nullable: true }
      - { name: max_storage_bytes,            type: numeric(20,0), nullable: true }
      - { name: max_ai_inferences_per_month,  type: integer,       nullable: true }
      - { name: api_rate_limit_per_minute,    type: integer,       nullable: true }
      - { name: created_at,                   type: timestamptz,   nullable: false, default: now() }
      - { name: updated_at,                   type: timestamptz,   nullable: false, default: now() }

  - name: Team
    table: teams
    description: Logical team structure within a tenant.
    primary_key: id
    columns:
      - { name: id,          type: uuid,        nullable: false, default: uuid_generate_v4() }
      - { name: tenant_id,   type: uuid,        nullable: false, references: tenants.id }
      - { name: location_id, type: uuid,        nullable: true, references: locations.id }
      - { name: name,        type: text,        nullable: false }
      - { name: description, type: text,        nullable: true }
      - { name: status,      type: text,        nullable: false, default: 'ACTIVE' }
      - { name: created_at,  type: timestamptz, nullable: false, default: now() }
      - { name: updated_at,  type: timestamptz, nullable: false, default: now() }
    indexes:
      - { name: idx_teams_tenant_location, columns: [tenant_id, location_id] }

  - name: TeamMember
    table: team_members
    description: Assignment of users to teams with optional location scope.
    primary_key: [team_id, user_id]
    columns:
      - { name: team_id,      type: uuid,        nullable: false, references: teams.id }
      - { name: user_id,      type: uuid,        nullable: false, references: users.id }
      - { name: location_id,  type: uuid,        nullable: true, references: locations.id }
      - { name: role_in_team, type: text,        nullable: true }
      - { name: joined_at,    type: timestamptz, nullable: false, default: now() }
      - { name: status,       type: text,        nullable: false, default: 'ACTIVE' }
    indexes:
      - { name: idx_team_members_user, columns: [user_id] }
      - { name: idx_team_members_team_status, columns: [team_id, status] }

  - name: UserAuthIdentity
    table: user_auth_identities
    description: Authentication identities and provider mappings per user.
    primary_key: id
    columns:
      - { name: id,               type: uuid,        nullable: false, default: uuid_generate_v4() }
      - { name: user_id,          type: uuid,        nullable: false, references: users.id }
      - { name: provider,         type: text,        nullable: false }
      - { name: provider_user_id, type: text,        nullable: false }
      - { name: email,            type: text,        nullable: true }
      - { name: password_hash,    type: text,        nullable: true }
      - { name: mfa_secret,       type: text,        nullable: true }
      - { name: metadata,         type: jsonb,       nullable: true }
      - { name: created_at,       type: timestamptz, nullable: false, default: now() }
      - { name: updated_at,       type: timestamptz, nullable: false, default: now() }
    indexes:
      - { name: idx_user_auth_identities_user, columns: [user_id] }

  - name: UserRole
    table: user_roles
    description: Role assignments with tenant and optional location/team scope.
    primary_key: id
    columns:
      - { name: id,             type: uuid,        nullable: false, default: uuid_generate_v4() }
      - { name: user_id,        type: uuid,        nullable: false, references: users.id }
      - { name: role_id,        type: uuid,        nullable: false, references: roles.id }
      - { name: tenant_id,      type: uuid,        nullable: false, references: tenants.id }
      - { name: location_id,    type: uuid,        nullable: true, references: locations.id }
      - { name: team_id,        type: uuid,        nullable: true, references: teams.id }
      - { name: resource_scope, type: text,        nullable: false, default: 'ALL_LOCATIONS' }
      - { name: valid_from,     type: timestamptz, nullable: true }
      - { name: valid_until,    type: timestamptz, nullable: true }
      - { name: created_at,     type: timestamptz, nullable: false, default: now() }
      - { name: updated_at,     type: timestamptz, nullable: false, default: now() }
    indexes:
      - { name: idx_user_roles_user_tenant, columns: [user_id, tenant_id] }
      - { name: idx_user_roles_role_tenant, columns: [role_id, tenant_id] }

  - name: User
    table: users
    description: Global user identity; related to tenants via user_tenants.
    primary_key: id
    columns:
      - { name: id,           type: uuid,        nullable: false, default: uuid_generate_v4() }
      - { name: email,        type: text,        nullable: false, unique: true, comment: "Case-insensitive uniqueness enforced by application normalization and unique index" }
      - { name: full_name,    type: text,        nullable: false }
      - { name: preferred_locale, type: text,    nullable: true }
      - { name: preferred_language, type: text,  nullable: true, comment: "ISO code used for voice and generated text output" }
      - { name: status,       type: text,        nullable: false, default: 'ACTIVE' }
      - { name: created_at,   type: timestamptz, nullable: false, default: now() }
      - { name: updated_at,   type: timestamptz, nullable: false, default: now() }

  - name: ApiClient
    table: api_clients
    description: Machine-to-machine client credentials (service accounts) for integrations and AI agents.
    primary_key: id
    columns:
      - { name: id,               type: uuid,        nullable: false, default: uuid_generate_v4() }
      - { name: tenant_id,        type: uuid,        nullable: true,  references: tenants.id, comment: "null for global clients, set for tenant-scoped agents" }
      - { name: client_id,        type: text,        nullable: false, unique: true, comment: "Public identifier used in OAuth/client-credentials flows" }
      - { name: name,             type: text,        nullable: false }
      - { name: description,      type: text,        nullable: true }
      - { name: client_secret_hash, type: text,      nullable: false, comment: "Hashed secret, never store plain text" }
      - { name: scopes,           type: jsonb,       nullable: true,  comment: "Array/list of allowed permission scopes" }
      - { name: rate_limit_per_minute, type: integer,nullable: true }
      - { name: ip_allowlist,     type: jsonb,       nullable: true,  comment: "Optional list of allowed IP ranges" }
      - { name: created_at,       type: timestamptz, nullable: false, default: now() }
      - { name: updated_at,       type: timestamptz, nullable: false, default: now() }
    indexes:
      - { name: idx_api_clients_tenant, columns: [tenant_id] }

  - name: Session
    table: sessions
    description: >
      OPTIONAL audit log of user authentication sessions.
      Active sessions are stored in Redis for performance (<1ms lookup, automatic TTL expiry).
      This PostgreSQL table is for compliance, forensics, and analytics only.
      Write to this table asynchronously (non-blocking) on login/logout.
    primary_key: id
    columns:
      - { name: id,               type: uuid,        nullable: false, comment: "Same as session_id stored in Redis and JWT" }
      - { name: user_id,          type: uuid,        nullable: false, references: users.id }
      - { name: tenant_id,        type: uuid,        nullable: false, references: tenants.id }
      - { name: token_hash,       type: text,        nullable: false, comment: "SHA256 hash of JWT for revocation checking" }
      - { name: ip_address,       type: inet,        nullable: true }
      - { name: user_agent,       type: text,        nullable: true }
      - { name: device_info,      type: jsonb,       nullable: true,  comment: "Device fingerprint, OS, browser" }
      - { name: last_activity_at, type: timestamptz, nullable: false, default: now() }
      - { name: expires_at,       type: timestamptz, nullable: false, comment: "Session expiry time (typically 24 hours)" }
      - { name: revoked_at,       type: timestamptz, nullable: true,  comment: "Set on logout or forced revocation" }
      - { name: revoke_reason,    type: text,        nullable: true,  comment: "USER_LOGOUT | ADMIN_REVOKE | SECURITY_BREACH | PASSWORD_CHANGE" }
      - { name: created_at,       type: timestamptz, nullable: false, default: now() }
    indexes:
      - { name: idx_sessions_user_active, columns: [user_id, expires_at], where: "revoked_at IS NULL" }
      - { name: idx_sessions_tenant, columns: [tenant_id, created_at] }
      - { name: idx_sessions_token_hash, columns: [token_hash], unique: true }
      - { name: idx_sessions_cleanup, columns: [expires_at], where: "revoked_at IS NULL AND expires_at < NOW()", comment: "For cleanup job" }

  - name: UserTenant
    table: user_tenants
    description: Membership of a user in a tenant with a given user type.
    primary_key: [user_id, tenant_id]
    columns:
      - { name: user_id,           type: uuid,        nullable: false, references: users.id }
      - { name: tenant_id,         type: uuid,        nullable: false, references: tenants.id }
      - { name: default_location_id, type: uuid,      nullable: true,  references: locations.id }
      - { name: user_type,         type: text,        nullable: false, comment: "DENTIST | HYGIENIST | ASSISTANT | ADMIN | FRONT_DESK | PATIENT | PAYER_ANALYST | REGULATOR | DEVELOPER" }
      - { name: created_at,        type: timestamptz, nullable: false, default: now() }
      - { name: updated_at,        type: timestamptz, nullable: false, default: now() }
    indexes:
      - { name: idx_user_tenants_tenant, columns: [tenant_id] }

  - name: Role
    table: roles
    description: RBAC roles, optionally tenant-scoped.
    primary_key: id
    columns:
      - { name: id,         type: uuid,        nullable: false, default: uuid_generate_v4() }
      - { name: tenant_id,  type: uuid,        nullable: true,  references: tenants.id, comment: "null for global roles" }
      - { name: name,       type: text,        nullable: false }
      - { name: description,type: text,        nullable: true }
      - { name: created_at, type: timestamptz, nullable: false, default: now() }
      - { name: updated_at, type: timestamptz, nullable: false, default: now() }
    indexes:
      - { name: idx_roles_tenant_name, columns: [tenant_id, name], unique: true }

  - name: Permission
    table: permissions
    description: Atomic permissions used in RBAC and ABAC.
    primary_key: id
    columns:
      - { name: id,         type: uuid,        nullable: false, default: uuid_generate_v4() }
      - { name: key,        type: text,        nullable: false, unique: true, comment: "e.g. patient.view, imaging.run_ai" }
      - { name: description,type: text,        nullable: true }

  - name: RolePermission
    table: role_permissions
    description: Many-to-many mapping between roles and permissions.
    primary_key: [role_id, permission_id]
    columns:
      - { name: role_id,       type: uuid, nullable: false, references: roles.id }
      - { name: permission_id, type: uuid, nullable: false, references: permissions.id }

  - name: AuditEvent
    table: audit_events
    description: Immutable log of security- and compliance-relevant events.
    primary_key: id
    partitioning:
      by: time
      column: occurred_at
      interval: month
    columns:
      - { name: id,           type: uuid,        nullable: false, default: uuid_generate_v4() }
      - { name: tenant_id,    type: uuid,        nullable: true,  references: tenants.id }
      - { name: actor_type,   type: text,        nullable: false, comment: "USER | SYSTEM | API_CLIENT" }
      - { name: actor_id,     type: uuid,        nullable: true }
      - { name: event_type,   type: text,        nullable: false }
      - { name: resource_type,type: text,        nullable: true }
      - { name: resource_id,  type: uuid,        nullable: true }
      - { name: occurred_at,  type: timestamptz, nullable: false, default: now() }
      - { name: ip_address,   type: inet,        nullable: true }
      - { name: user_agent,   type: text,        nullable: true }
      - { name: request_id,   type: text,        nullable: true }
      - { name: metadata,     type: jsonb,       nullable: true }
    indexes:
      - { name: idx_audit_tenant_time, columns: [tenant_id, occurred_at] }
      - { name: idx_audit_resource,    columns: [resource_type, resource_id] }

  - name: Consent
    table: consents
    description: Consent state for patient/provider/tenant operations like AI analysis and recording.
    primary_key: id
    columns:
      - { name: id,            type: uuid,        nullable: false, default: uuid_generate_v4() }
      - { name: tenant_id,     type: uuid,        nullable: false, references: tenants.id }
      - { name: subject_type,  type: text,        nullable: false, comment: "PATIENT | USER | PROVIDER | TENANT" }
      - { name: subject_id,    type: uuid,        nullable: false }
      - { name: consent_type,  type: text,        nullable: false, comment: "AI_ANALYSIS | AUDIO_RECORDING | DATA_SHARING | RESEARCH | MARKETING" }
      - { name: scope,         type: jsonb,       nullable: true }
      - { name: status,        type: text,        nullable: false, default: 'GRANTED', comment: "GRANTED | REVOKED | EXPIRED" }
      - { name: granted_at,    type: timestamptz, nullable: false, default: now() }
      - { name: revoked_at,    type: timestamptz, nullable: true }
      - { name: expires_at,    type: timestamptz, nullable: true }
      - { name: source,        type: text,        nullable: true }
      - { name: document_uri,  type: text,        nullable: true }
      - { name: recorded_by_id,type: uuid,        nullable: true, references: users.id }
      - { name: created_at,    type: timestamptz, nullable: false, default: now() }
      - { name: updated_at,    type: timestamptz, nullable: false, default: now() }
    indexes:
      - { name: idx_consents_subject, columns: [tenant_id, subject_type, subject_id, consent_type] }
      - { name: idx_consents_active, columns: [tenant_id, consent_type, status, expires_at], where: "status = 'GRANTED'" }

  - name: PHIAccessLog
    table: phi_access_logs
    description: Immutable access log for PHI-bearing resources.
    primary_key: id
    columns:
      - { name: id,            type: uuid,        nullable: false, default: uuid_generate_v4() }
      - { name: tenant_id,     type: uuid,        nullable: false, references: tenants.id }
      - { name: actor_type,    type: text,        nullable: false, comment: "USER | API_CLIENT | SYSTEM" }
      - { name: actor_id,      type: uuid,        nullable: true }
      - { name: patient_id,    type: uuid,        nullable: true, references: patients.id }
      - { name: resource_type, type: text,        nullable: false }
      - { name: resource_id,   type: uuid,        nullable: false }
      - { name: access_type,   type: text,        nullable: false, comment: "VIEW | EXPORT | DOWNLOAD | PLAYBACK | UPDATE" }
      - { name: purpose_of_use,type: text,        nullable: true }
      - { name: request_id,    type: text,        nullable: true }
      - { name: ip_address,    type: inet,        nullable: true }
      - { name: user_agent,    type: text,        nullable: true }
      - { name: metadata,      type: jsonb,       nullable: true }
      - { name: occurred_at,   type: timestamptz, nullable: false, default: now() }
    indexes:
      - { name: idx_phi_access_tenant_time, columns: [tenant_id, occurred_at] }
      - { name: idx_phi_access_patient_time, columns: [tenant_id, patient_id, occurred_at], where: "patient_id IS NOT NULL" }
      - { name: idx_phi_access_resource, columns: [tenant_id, resource_type, resource_id, occurred_at] }
      - { name: idx_phi_access_actor, columns: [tenant_id, actor_type, actor_id, occurred_at] }

  - name: DataRetentionPolicy
    table: data_retention_policies
    description: Retention and archival policy by tenant and data class.
    primary_key: id
    columns:
      - { name: id,                 type: uuid,        nullable: false, default: uuid_generate_v4() }
      - { name: tenant_id,          type: uuid,        nullable: false, references: tenants.id }
      - { name: data_class,         type: text,        nullable: false, comment: "PATIENT_RECORD | IMAGING | VOICE_AUDIO | AUDIT_LOG | ANALYTICS" }
      - { name: retention_unit,     type: text,        nullable: false, default: 'DAYS' }
      - { name: retention_value,    type: integer,     nullable: false }
      - { name: archive_after_value,type: integer,     nullable: true }
      - { name: archive_storage_class, type: text,     nullable: true }
